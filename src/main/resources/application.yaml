spring:
  application:
    name: taskiu
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import:
      - optional:classpath:application-${spring.profiles.active}.yaml
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:password123}
    mongodb:
      host: ${SPRING_DATA_MONGODB_HOST:localhost}
      port: ${SPRING_DATA_MONGODB_PORT:27017}
      database: ${SPRING_DATA_MONGODB_DATABASE:taskiu}
      username: ${SPRING_DATA_MONGODB_USERNAME:admin}
      password: ${SPRING_DATA_MONGODB_PASSWORD:password123}
      authentication-database: admin
      auto-index-creation: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/taskiu}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password123}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MIN_IDLE:10}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:30000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:1800000}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:600000}
      pool-name: MyHikariCP
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:admin}
    password: ${SPRING_RABBITMQ_PASSWORD:password123}
    virtual-host: ${SPRING_RABBITMQ_VIRTUAL_HOST:/taskiu}
    listener:
      simple:
        concurrency: 3
        max-concurrency: 10
        prefetch: 5
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 3000
          writetimeout: 5000

server:
  port: ${SERVER_PORT:8088}
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics

app:
  security:
    whitelist:
      - /public/**
      - /test/**
      - /auth/**
  deploy:
    expectedHost: ${APP_EXPECTED_HOST:http://localhost:5173}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
    allow-credentials: true
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - Authorization
      - Content-Type
      - Accept
      - Origin
      - X-Requested-With
  token:
    jwt-secret: ${JWT_SECRET}
    refresh-token-duration-ms: ${JWT_REFRESH_TOKEN_DURATION:604800000}

security:
  csp:
    policy:
      default-src:
        - "'self'"
      script-src:
        - "'self'"
        - "${APP_EXPECTED_HOST:http://localhost:5173}"
        - "https://apis.google.com"
      style-src:
        - "'self'"
        - "'unsafe-inline'"
        - "https://fonts.googleapis.com"
      font-src:
        - "'self'"
        - "https://fonts.gstatic.com"
      img-src:
        - "'self'"
        - "data:"
        - "https://lh3.googleusercontent.com"
        - "https://avatars.githubusercontent.com"
      connect-src:
        - "'self'"
        - "https://oauth2.googleapis.com"
        - "https://www.googleapis.com"

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:admin}
  secret-key: ${MINIO_SECRET_KEY:password123}
  bucket-name: ${MINIO_BUCKET_NAME:taskiu-bucket-dev}
  prefix:
    avatar: "avatars/"
    attachment: "attachments/"

cloudflare:
  turnstile:
    secret-key: ${CLOUDFLARE_TURNSTILE_SECRET_KEY}
    verify-url: "https://challenges.cloudflare.com/turnstile/v0/siteverify"

debug: ${DEBUG_MODE:false}

google:
  client-id: ${GOOGLE_CLIENT_ID}
  client-secret: ${GOOGLE_CLIENT_SECRET}
  redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:5173/auth/google-callback}
  token-uri: "https://oauth2.googleapis.com/token"

github:
  client-id: ${GITHUB_CLIENT_ID}
  client-secret: ${GITHUB_CLIENT_SECRET}
  redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:5173/auth/github-callback}
  token-uri: "https://github.com/login/oauth/access_token"